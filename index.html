    const { useState, useEffect, useCallback } = React;

    // --- BASE DE DATOS INDEXEDDB ---
    const DB_NAME = "AtelierDB";
    const DB_VERSION = 1;
    const STORES = ['notas', 'referencias', 'libros', 'historia', 'expos', 'tecnicas'];

    const initDB = () => {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                STORES.forEach(store => {
                    if (!db.objectStoreNames.contains(store)) {
                        db.createObjectStore(store, { keyPath: "id" });
                    }
                });
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    };

    const dbGetAll = async (storeName) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result.sort((a,b) => b.id - a.id));
            request.onerror = () => reject(request.error);
        });
    };

    const dbSave = async (storeName, data) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const request = store.put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    };

    const dbDelete = async (storeName, id) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    };

    const Palette = (p) => <Icon {...p} path='<circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path>' />;
    const Camera = (p) => <Icon {...p} path='<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>' />;
    const X = (p) => <Icon {...p} path='<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' />;
    const RefreshCw = (p) => <Icon {...p} path='<polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>' />;

    // --- TEMA Y ESTILOS CONSTANTES ---
    const theme = {

    // --- FRASES INSPIRADORAS DE ARTE ---
    const FRASES_ARTE = [
      { texto: "No pinto lo que veo, sino lo que siento.", autor: "Vincent van Gogh" },
      { texto: "El arte es la mentira que nos permite comprender la verdad.", autor: "Pablo Picasso" },
      { texto: "Los colores son las sonrisas de la naturaleza.", autor: "Leigh Hunt" },

      { texto: "La pintura es poesía silenciosa, y la poesía es pintura que habla.", autor: "Plutarco" },

      { texto: "El objetivo del arte es representar no la apariencia exterior, sino el significado interior.", autor: "Aristóteles" },

    // --- Función para obtener un número "semilla" basado en el día ---
    const getDaySeed = () => {
      const today = new Date();
      const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
      return today.getFullYear() * 1000 + dayOfYear;
    };

    // --- Seeded pseudo-random (para consistencia diaria) ---
    const seededRandom = (seed) => {
      const x = Math.sin(seed * 9301 + 49297) * 49297;
      return x - Math.floor(x);
    };

    // --- FUNCIONES UTILERÍA ---
    const formatShortDate = (dateString) => {
      if (!dateString) return 'S/F';
      const date = new Date(dateString + 'T00:00:00');
      if (isNaN(date)) return dateString;
      return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    };

    const obtenerFechaActual = () => {
      return new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    };

    // --- COMPONENTE: INSPIRACIÓN DEL DÍA ---
    const InspiracionDelDia = () => {
      const [obra, setObra] = useState(null);
      const [frase, setFrase] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(false);
      const [imgLoaded, setImgLoaded] = useState(false);

      const fetchObraDelDia = useCallback(async (forceNew = false) => {
        setLoading(true);
        setError(false);
        setImgLoaded(false);

        const seed = getDaySeed() + (forceNew ? Math.floor(Math.random() * 10000) : 0);

        // Seleccionar frase del día
        const fraseIndex = Math.floor(seededRandom(seed) * FRASES_ARTE.length);
        setFrase(FRASES_ARTE[fraseIndex]);

        // Comprobar caché en sessionStorage (solo si no es forzado)
        if (!forceNew) {
          try {
            const cached = sessionStorage.getItem('atelier_inspiracion');
            if (cached) {
              const parsed = JSON.parse(cached);
              if (parsed.seed === getDaySeed()) {
                setObra(parsed.obra);
                setLoading(false);
                return;
              }
            }
          } catch(e) {}
        }

        try {
          // IDs de obras destacadas del Art Institute of Chicago (public domain, con imagen)
          // Mezcla de estilos: impresionismo, renacimiento, barroco, japonés, moderno...
          const CURATED_IDS = [
            27992, 28560, 111628, 129884, 80607, 87479, 14598, 20684, 
            16568, 111317, 111442, 16571, 16487, 28067, 59426, 21023,
            14655, 100858, 76395, 117271, 185905, 151363, 24645, 4081,
            11434, 15401, 6596, 14620, 117266, 16327, 86385, 109819,
            25865, 76244, 83642, 102611, 11272, 15468, 229406, 75644,
            27281, 24836, 89856, 66039, 64818, 100472, 70443, 87045,
            52560, 21976, 80084, 7124, 23684, 20579, 73417, 146953,
            36161, 110634, 8958, 142476, 22432, 71829, 90048, 93820,
          ];

          const artworkIndex = Math.floor(seededRandom(seed + 1) * CURATED_IDS.length);
          const artworkId = CURATED_IDS[artworkIndex];

          const response = await fetch(
            `https://api.artic.edu/api/v1/artworks/${artworkId}?fields=id,title,artist_display,date_display,image_id,thumbnail,medium_display,dimensions,classification_title`
          );

          if (!response.ok) throw new Error('API error');
          const data = await response.json();
          const artwork = data.data;

          if (!artwork || !artwork.image_id) throw new Error('No image');

          const obraData = {
            titulo: artwork.title || 'Sin título',
            artista: artwork.artist_display || 'Artista desconocido',
            fecha: artwork.date_display || '',
            medio: artwork.medium_display || '',
            clasificacion: artwork.classification_title || '',
            imageUrl: `https://www.artic.edu/iiif/2/${artwork.image_id}/full/843,/0/default.jpg`,
            thumbColor: artwork.thumbnail?.lqip || null,
            altText: artwork.thumbnail?.alt_text || artwork.title,
            link: `https://www.artic.edu/artworks/${artwork.id}`,
          };

          setObra(obraData);

          // Cachear para el día
          try {
            sessionStorage.setItem('atelier_inspiracion', JSON.stringify({ seed: getDaySeed(), obra: obraData }));
          } catch(e) {}

        } catch (err) {
          console.warn('Error fetching artwork:', err);
          setError(true);
        }
        setLoading(false);
      }, []);

      useEffect(() => { fetchObraDelDia(); }, [fetchObraDelDia]);

      // Estado: cargando
      if (loading) {
        return (

            <h3 className="text-xs text-gray-400 mb-3 ml-2 font-bold uppercase tracking-widest">Inspiración del Día</h3>

                <div className="shimmer-loading h-3 w-2/3 rounded-full"></div>
                <div className="shimmer-loading h-2 w-1/2 rounded-full"></div>
              </div>
            </div>
          </div>
        );
      }

      // Estado: error
      if (error || !obra) {
        return (

                <RefreshCw size={14} /> Reintentar
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="mb-8">
          <div className="flex items-center justify-between mb-3 ml-2 mr-2">
            <h3 className="text-xs text-gray-400 font-bold uppercase tracking-widest">Inspiración del Día</h3>
            <button onClick={() => fetchObraDelDia(true)} className="text-gray-300 active:text-[#5b85b5] active:scale-90 transition-all p-1" title="Otra obra">
              <RefreshCw size={14} />
            </button>
          </div>
          
          <div className={`rounded-3xl ${theme.bgMain} ${theme.shadowFlat} overflow-hidden fade-in-up`}>
            {/* Imagen de la obra */}
            <div className="relative w-full overflow-hidden rounded-t-3xl" style={{ 
              backgroundColor: obra.thumbColor ? undefined : '#2a2a2a',
            }}>
              {/* LQIP background while loading */}
              {obra.thumbColor && !imgLoaded && (
                <img src={obra.thumbColor} alt="" className="absolute inset-0 w-full h-full object-cover" style={{ filter: 'blur(20px)', transform: 'scale(1.1)' }} />
              )}
              <img 
                src={obra.imageUrl} 
                alt={obra.altText}
                className="w-full object-contain relative z-[1]"
                style={{ 
                  maxHeight: '420px',
                  opacity: imgLoaded ? 1 : 0,
                  transition: 'opacity 0.5s ease-in-out',
                  backgroundColor: '#1a1a1a'
                }}
                onLoad={() => setImgLoaded(true)}
                onError={(e) => { e.target.style.display = 'none'; }}
              />
              
              {/* Overlay con info en la parte inferior de la imagen */}
              <div className="absolute bottom-0 left-0 right-0 z-[2]" style={{ background: 'linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 60%, transparent 100%)' }}>
                <div className="px-5 py-4">
                  <p className="text-[9px] text-white/60 uppercase tracking-[0.2em] font-bold mb-1">Inspiración del Día</p>
                  <p className="text-white text-sm font-serif leading-snug line-clamp-2" style={{ textShadow: '0 1px 3px rgba(0,0,0,0.5)' }}>{obra.titulo}</p>
                  <p className="text-white/70 text-xs mt-1 line-clamp-1">{obra.artista}</p>
                </div>
              </div>
            </div>

            {/* Frase inspiradora */}

    const FormularioDinamico = ({ isAdding, formData, handleInputChange, toggleDia, resetForm, handleGuardar, setFormData }) => {

      const handleLocalImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
              let width = img.width; let height = img.height;
              if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
              else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
              setFormData(prev => ({ ...prev, imagenesRef: [...(prev.imagenesRef || []), compressedBase64] }));
            }
          };
        });
      };

      const removeImageRef = (indexToRemove) => setFormData(prev => ({ ...prev, imagenesRef: prev.imagenesRef.filter((_, idx) => idx !== indexToRemove) }));

                  <textarea autoFocus value={tempResena} onChange={e => setTempResena(e.target.value)} placeholder="Anota aquí las lecciones de este libro..." className={`w-full bg-transparent text-base ${theme.textDark} leading-relaxed focus:outline-none min-h-[150px] resize-none`} />

                    <button onClick={() => setIsEditingResena(false)} className="px-4 py-2 rounded-xl text-xs font-bold text-gray-400 uppercase tracking-widest active:scale-95">Cancelar</button>
                    <button onClick={handleSaveResena} className={`px-4 py-2 rounded-xl ${theme.bgAccent} text-white text-xs font-bold uppercase tracking-widest shadow-md active:scale-95`}>Guardar</button>
                  </div>
                </div>
              ) : (
                data.reseña ? <p className={`${theme.textDark} leading-relaxed text-sm whitespace-pre-line`}>{data.reseña}</p> : <p className="text-gray-400 text-sm italic font-serif">"Sin notas. Pulsa Editar para escribir."</p>
              )}
            </div>
          </section>
        </div>
      )}

      {type === 'tecnica' && (
        <div className="px-8 mt-6 space-y-8">
          <div className="text-center border-b border-gray-200/50 pb-6">
            <span className="inline-flex items-center justify-center w-12 h-12 rounded-full text-[#5b85b5] mb-4 bg-[#f5f6f8] shadow-[inset_4px_4px_8px_#d8dde6,inset_-4px_-4px_8px_#ffffff]">
              <Palette size={20} />
            </span>
            <h1 className={`font-serif text-3xl ${theme.textDark} mb-4 leading-tight`}>{data.titulo}</h1>
          </div>
          <div className="pt-2">
            <h3 className="text-xs text-gray-400 mb-4 font-bold uppercase tracking-widest text-center">Proceso / Receta</h3>
            <div className={`p-8 rounded-3xl ${theme.shadowInset} bg-[#f5f6f8] mb-8`}>
              <p className={`${theme.textDark} leading-relaxed text-sm whitespace-pre-line`}>{data.pasos}</p>
            </div>
          </div>
        </div>
      )}
    </main>
  );
};

const App = () => {
  const [activeTab, setActiveTab] = useState('inicio');
  const [selectedItem, setSelectedItem] = useState(null); 
  const [isAdding, setIsAdding] = useState(null); 
  const [filtroGaleria, setFiltroGaleria] = useState('Todas');

  const [isEditingImage, setIsEditingImage] = useState(false);
  const [tempImageUrl, setTempImageUrl] = useState('');
  const [itemToDelete, setItemToDelete] = useState(null);

  const [isEditingResena, setIsEditingResena] = useState(false);
  const [tempResena, setTempResena] = useState('');

  const [notas, setNotas] = useState([]);
  const [referencias, setReferencias] = useState([]);
  const [libros, setLibros] = useState([]);
  const [historia, setHistoria] = useState([]);
  const [expos, setExpos] = useState([]);
  const [tecnicas, setTecnicas] = useState([]);

  useEffect(() => {
    const loadAllData = async () => {
      try {
        const storesMap = {
          'atelier_notas': 'notas', 'atelier_referencias': 'referencias',
          'atelier_libros': 'libros', 'atelier_historia': 'historia',
          'atelier_expos': 'expos', 'atelier_tecnicas': 'tecnicas'
        };
        for (const [localKey, dbStore] of Object.entries(storesMap)) {
          const localData = localStorage.getItem(localKey);
          if (localData) {
            try {
              const parsedData = JSON.parse(localData);
              if (Array.isArray(parsedData) && parsedData.length > 0) {
                const currentDbData = await dbGetAll(dbStore);
                if (currentDbData.length === 0) {
                  for (const item of parsedData) await dbSave(dbStore, item);
                }
              }
            } catch (e) {}
          }
        }
        setNotas(await dbGetAll('notas')); setReferencias(await dbGetAll('referencias'));
        setLibros(await dbGetAll('libros')); setHistoria(await dbGetAll('historia'));
        setExpos(await dbGetAll('expos')); setTecnicas(await dbGetAll('tecnicas'));
      } catch (error) { console.error(error); }
    };
    loadAllData();
  }, []);

  const [formData, setFormData] = useState({});
  const handleInputChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

  const toggleDia = (dia) => {
    const diasActuales = formData.dias || [];
    if (diasActuales.includes(dia)) { setFormData({ ...formData, dias: diasActuales.filter(d => d !== dia) }); } 
    else { setFormData({ ...formData, dias: [...diasActuales, dia] }); }
  };

  const abrirFormulario = (tipo) => {
    setFormData(tipo === 'expo' ? { esGratis: false, dias: [] } : {});
    setIsAdding(tipo);
  };

  const resetForm = () => { setFormData({}); setIsAdding(null); };

  const handleGuardar = async () => {
    const id = Date.now();
    let nuevoItem = null; let storeName = "";
    
    if (isAdding === 'nota') {
      storeName = 'notas'; nuevoItem = { id, titulo: formData.titulo || 'Sin título', autor: formData.autor || 'Desconocido', año: formData.año || 'S/F', disciplina: formData.disciplina || 'Pintura', imagen: formData.imagen || 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800&q=80', etiquetas: [(formData.disciplina || 'Pintura').toLowerCase()], historia: formData.historia || 'Sin detalles.', inspiracion: formData.inspiracion || 'Sin notas.', evolucion: [] };
      setNotas([nuevoItem, ...notas]);
    } 
    else if (isAdding === 'historia') {
      storeName = 'historia'; const etiquetasArray = formData.etiquetas ? formData.etiquetas.split(',').map(e => e.trim()) : [];
      nuevoItem = { id, tema: formData.tema || 'Apunte sin título', fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }), etiquetas: etiquetasArray, resumen: formData.resumen || 'Sin contenido.' };
      setHistoria([nuevoItem, ...historia]);
    }
    else if (isAdding === 'libro') {
      storeName = 'libros'; nuevoItem = { id, titulo: formData.titulo || 'Libro sin título', autor: formData.autor || 'S/A', estado: formData.estado || 'Pendiente', progreso: 0, imagen: formData.imagen || 'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=400&q=80', reseña: formData.reseña || '' };
      setLibros([nuevoItem, ...libros]);
    }
    else if (isAdding === 'galeria') {
      storeName = 'referencias'; nuevoItem = { id, img: formData.imagen || 'https://images.unsplash.com/photo-1597255998145-66270ebfc6e1?w=500&q=80', cat: formData.categoria || 'Luz', nota: formData.nota || 'Sin nota' };
      setReferencias([nuevoItem, ...referencias]);
    }
    else if (isAdding === 'tecnica') {
      storeName = 'tecnicas'; nuevoItem = { id, titulo: formData.titulo || 'Receta sin título', medio: formData.medio || 'Óleo', pasos: formData.pasos || 'Sin pasos descritos.', imagenesRef: formData.imagenesRef || [] };
      setTecnicas([nuevoItem, ...tecnicas]);
    }
    else if (isAdding === 'expo') {
      storeName = 'expos'; nuevoItem = { id, titulo: formData.titulo || 'Exposición sin título', lugar: formData.lugar || 'Lugar desconocido', fechaInicio: formData.fechaInicio || '', fechaFin: formData.fechaFin || '', dias: formData.dias || [], esGratis: formData.esGratis === true, precio: formData.esGratis ? '0' : (formData.precio || ''), imagen: formData.imagen || 'https://images.unsplash.com/photo-1531058020387-3be344556be6?w=800&q=80', reseña: formData.reseña || '' };
      setExpos([nuevoItem, ...expos]);
    }
    if (nuevoItem && storeName) await dbSave(storeName, nuevoItem);
    resetForm();
  };

  const handleEliminarClick = () => setItemToDelete({ type: selectedItem.type, id: selectedItem.data.id, isDetail: true });
  const handleEliminarReferenciaClick = (id) => setItemToDelete({ type: 'referencia', id: id, isDetail: false });

  const confirmarEliminar = async () => {
    const storeMap = { nota: 'notas', historia: 'historia', libro: 'libros', referencia: 'referencias', expo: 'expos', tecnica: 'tecnicas' };
    const storeName = storeMap[itemToDelete.type];
    if (storeName) await dbDelete(storeName, itemToDelete.id);

    if (itemToDelete.type === 'nota') setNotas(notas.filter(n => n.id !== itemToDelete.id));
    if (itemToDelete.type === 'historia') setHistoria(historia.filter(h => h.id !== itemToDelete.id));
    if (itemToDelete.type === 'libro') setLibros(libros.filter(l => l.id !== itemToDelete.id));
    if (itemToDelete.type === 'referencia') setReferencias(referencias.filter(r => r.id !== itemToDelete.id));
    if (itemToDelete.type === 'expo') setExpos(expos.filter(e => e.id !== itemToDelete.id));
    if (itemToDelete.type === 'tecnica') setTecnicas(tecnicas.filter(t => t.id !== itemToDelete.id));
    
    if (itemToDelete.isDetail) setSelectedItem(null);
    setItemToDelete(null);
  };

  const handleSaveImageEdit = async () => {
    if (!tempImageUrl.trim()) { setIsEditingImage(false); return; }
    let storeName = ""; let updatedItem = null;
    if (selectedItem && selectedItem.type === 'nota') { updatedItem = { ...selectedItem.data, imagen: tempImageUrl }; storeName = 'notas'; setNotas(notas.map(nota => nota.id === selectedItem.data.id ? updatedItem : nota)); }
    else if (selectedItem && selectedItem.type === 'expo') { updatedItem = { ...selectedItem.data, imagen: tempImageUrl }; storeName = 'expos'; setExpos(expos.map(expo => expo.id === selectedItem.data.id ? updatedItem : expo)); }
    else if (selectedItem && selectedItem.type === 'libro') { updatedItem = { ...selectedItem.data, imagen: tempImageUrl }; storeName = 'libros'; setLibros(libros.map(libro => libro.id === selectedItem.data.id ? updatedItem : libro)); }
    if (updatedItem && storeName) { await dbSave(storeName, updatedItem); setSelectedItem({ ...selectedItem, data: updatedItem }); }
    setIsEditingImage(false);
  };

  const handleKeyDownImageEdit = (e) => {
    if (e.key === 'Enter') handleSaveImageEdit();
    if (e.key === 'Escape') setIsEditingImage(false); 
  };

  const handleSaveResena = async () => {
    let storeName = ""; let updatedItem = null;
    if (selectedItem && selectedItem.type === 'expo') { updatedItem = { ...selectedItem.data, reseña: tempResena }; storeName = 'expos'; setExpos(expos.map(expo => expo.id === selectedItem.data.id ? updatedItem : expo)); }
    else if (selectedItem && selectedItem.type === 'libro') { updatedItem = { ...selectedItem.data, reseña: tempResena }; storeName = 'libros'; setLibros(libros.map(libro => libro.id === selectedItem.data.id ? updatedItem : libro)); }
    if (updatedItem && storeName) { await dbSave(storeName, updatedItem); setSelectedItem({ ...selectedItem, data: updatedItem }); }
    setIsEditingResena(false);
  };

  const renderModal = () => {
    if (!itemToDelete) return null;
    return (
      <div className="absolute inset-0 z-[60] bg-black/40 backdrop-blur-sm flex items-center justify-center px-6 transition-all" style={{WebkitBackdropFilter: 'blur(4px)'}}>
        <div className={`w-full max-w-sm ${theme.bgMain} rounded-3xl p-6 ${theme.shadowFlat} flex flex-col items-center text-center`}>
          <div className="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mb-4 shadow-inner"><Trash2 size={28} className="text-red-400" /></div>
          <h3 className={`font-serif text-2xl ${theme.textDark} mb-2`}>¿Eliminar elemento?</h3>
          <p className="text-sm text-gray-500 mb-8 px-4">Esta acción no se puede deshacer.</p>
          <div className="flex gap-4 w-full">
            <button onClick={() => setItemToDelete(null)} className={`flex-1 py-4 rounded-2xl ${theme.bgMain} ${theme.shadowFlat} text-gray-500 font-bold text-xs uppercase tracking-widest active:scale-95 transition-all`}>Cancelar</button>
            <button onClick={confirmarEliminar} className="flex-1 py-4 rounded-2xl bg-red-400 text-white font-bold text-xs uppercase tracking-widest shadow-[4px_4px_10px_#d8dde6,-4px_-4px_10px_#ffffff] active:shadow-inner transition-all active:scale-95">Eliminar</button>
          </div>
        </div>
      </div>
    );
  };

  const renderCurrentView = () => {
    if (isAdding) return <FormularioDinamico {...{isAdding, formData, handleInputChange, toggleDia, setFormData, resetForm, handleGuardar}} />;
    if (selectedItem) return <VistaDetalle {...{ selectedItem, setSelectedItem, handleEliminarClick, isEditingImage, setIsEditingImage, tempImageUrl, setTempImageUrl, handleSaveImageEdit, handleKeyDownImageEdit, isEditingResena, setIsEditingResena, tempResena, setTempResena, handleSaveResena }} />;
    
    switch (activeTab) {
      case 'inicio': return <HomeView {...{historia, libros, notas, referencias, expos, tecnicas, setActiveTab, abrirFormulario}} />;
      case 'historia': return <HistoriaList {...{historia, abrirFormulario, setSelectedItem}} />;
      case 'libros': return <LibrosList {...{libros, abrirFormulario, setSelectedItem}} />;
      case 'notas': return <NotasList {...{notas, abrirFormulario, setSelectedItem}} />;
      case 'tecnicas': return <TecnicasList {...{tecnicas, abrirFormulario, setSelectedItem}} />;
      case 'galeria': return <GaleriaList {...{referencias, filtroGaleria, setFiltroGaleria, abrirFormulario, handleEliminarReferenciaClick}} />;
      case 'expos': return <ExposicionesList {...{expos, abrirFormulario, setSelectedItem}} />;
      default: return <HomeView {...{historia, libros, notas, referencias, expos, tecnicas, setActiveTab, abrirFormulario}} />;
    }
  };

  const showBottomNav = !isAdding && !selectedItem;

  return (
    <div className={`min-h-screen ${theme.bgMain} font-sans flex justify-center`}>
      <div className={`w-full relative ${theme.bgMain} overflow-hidden flex flex-col h-screen-safe`}>
        {renderModal()}
        {showBottomNav && (
          <header className="px-6 pb-4 safe-pt flex justify-between items-end flex-shrink-0 z-[40]">
            <div>
              <h1 className={`${theme.textDark} text-2xl font-light tracking-wide flex items-baseline gap-2`}>
                Atelier <span className="text-sm text-gray-400 font-sans">アトリエ</span>
              </h1>
            </div>
            <div className="flex gap-4 text-gray-500">
              <span className="text-xs uppercase tracking-widest mt-2">Estudio</span>
            </div>
          </header>
        )}
        <div className="flex-1 overflow-hidden relative">
          {renderCurrentView()}
        </div>
        {showBottomNav && <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />}
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
```

</script>
