<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Atelier">
    <meta name="theme-color" content="#f5f6f8">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f5f6f8' width='100' height='100' rx='20'/><text y='65' x='50' text-anchor='middle' font-size='50'>🎨</text></svg>">
    <title>Atelier アトリエ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f5f6f8; overscroll-behavior-y: none; overflow: hidden;
        }
        #root { width: 100%; height: 100%; }
        .h-screen-safe { height: 100vh; height: 100dvh; }
        .safe-pt { padding-top: max(env(safe-area-inset-top), 20px); }
        .safe-pb-nav { padding-bottom: max(env(safe-area-inset-bottom), 16px); }
        .main-content-pb { padding-bottom: calc(110px + env(safe-area-inset-bottom)); }

        input, textarea, select { font-size: 16px !important; touch-action: manipulation; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Neomórfico */
        .nm-flat { background: #f5f6f8; box-shadow: 6px 6px 16px #d8dde6, -6px -6px 16px #ffffff; }
        .nm-inset { background: #f5f6f8; box-shadow: inset 4px 4px 8px #d8dde6, inset -4px -4px 8px #ffffff; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- UTILS INDEXEDDB ---
    const STORES = ['notas', 'referencias', 'libros', 'historia', 'expos', 'tecnicas'];
    const initDB = () => new Promise((res) => {
        const req = indexedDB.open("AtelierDB", 1);
        req.onupgradeneeded = e => STORES.forEach(s => !e.target.result.objectStoreNames.contains(s) && e.target.result.createObjectStore(s, {keyPath: "id"}));
        req.onsuccess = () => res(req.result);
    });
    const dbGetAll = async (s) => {
        const db = await initDB();
        return new Promise(res => {
            const req = db.transaction(s, "readonly").objectStore(s).getAll();
            req.onsuccess = () => res(req.result.sort((a,b) => b.id - a.id));
        });
    };
    const dbSave = async (s, d) => { const db = await initDB(); db.transaction(s, "readwrite").objectStore(s).put(d); };

    // --- ICONOS ---
    const Icon = ({ path, size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );
    const HomeIco = (p) => <Icon {...p} path='<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' />;
    const BookIco = (p) => <Icon {...p} path='<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' />;
    const NoteIco = (p) => <Icon {...p} path='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line>' />;
    const GalleryIco = (p) => <Icon {...p} path='<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>' />;
    const ExpoIco = (p) => <Icon {...p} path='<path d="M15 5.25a3 3 0 0 1-3-3H6a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3a3 3 0 0 1-3-3v-5.25z"></path>' />;
    const HistIco = (p) => <Icon {...p} path='<line x1="3" y1="22" x2="21" y2="22"></line><line x1="6" y1="18" x2="6" y2="11"></line><line x1="10" y1="18" x2="10" y2="11"></line><line x1="14" y1="18" x2="14" y2="11"></line>' />;

    // --- DATOS DE RESPALDO (INSTANTÁNEOS) ---
    const FALLBACK_ART = [
        { img: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800", title: "Composición Floral", artist: "Abstracción Moderna" },
        { img: "https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800", title: "Impresión de Amanecer", artist: "Claude Monet (Ref)" },
        { img: "https://images.unsplash.com/photo-1549490349-8643362247b5?w=800", title: "Estudio de Color", artist: "Galería Atelier" }
    ];
    const QUOTES = [
        { q: "La pintura es poesía muda; la poesía pintura ciega.", a: "Leonardo da Vinci" },
        { q: "Aprende las reglas como un profesional para poder romperlas como un artista.", a: "Pablo Picasso" },
        { q: "No pinto lo que veo, sino lo que siento.", a: "Vincent van Gogh" },
        { q: "El arte lava del alma el polvo de la vida cotidiana.", a: "Pablo Picasso" },
        { q: "La inspiración existe, pero tiene que encontrarte trabajando.", a: "Pablo Picasso" }
    ];

    // --- COMPONENTES ---
    const InspirationCard = ({ data, loading }) => {
        if (loading) return (
            <div className="w-full aspect-[4/5] rounded-3xl nm-inset flex flex-col items-center justify-center text-gray-400 mb-8">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-[#5b85b5] mb-4"></div>
                <p className="font-serif italic text-sm">Buscando una obra para ti...</p>
            </div>
        );

        return (
            <div className="w-full rounded-3xl p-3 nm-flat fade-in mb-8">
                <div className="w-full aspect-[4/5] rounded-2xl overflow-hidden mb-4 shadow-inner relative bg-gray-200">
                    <img src={data.image} alt="Arte diario" className="w-full h-full object-cover" onError={(e) => e.target.src = FALLBACK_ART[0].img} />
                    <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/70 via-black/20 to-transparent text-white">
                        <p className="text-[10px] uppercase tracking-widest font-bold opacity-80">Inspiración del día</p>
                        <p className="text-base font-serif italic truncate">{data.title}</p>
                        <p className="text-[10px] opacity-70">{data.artist}</p>
                    </div>
                </div>
                <div className="px-4 py-3 text-center">
                    <p className="font-serif italic text-lg text-[#4a5568] leading-tight">"{data.quote}"</p>
                    <p className="text-[10px] text-[#5b85b5] font-bold uppercase tracking-widest mt-3">— {data.quoteAuthor}</p>
                </div>
            </div>
        );
    };

    const App = () => {
        const [activeTab, setActiveTab] = useState('inicio');
        const [inspiration, setInspiration] = useState(null);
        const [loadingInspiration, setLoadingInspiration] = useState(true);
        const [counts, setCounts] = useState({ historia: 0, libros: 0, notas: 0, referencias: 0, tecnicas: 0, expos: 0 });
        const [lastHist, setLastHist] = useState(null);

        useEffect(() => {
            loadData();
            getDailyContent();
        }, []);

        const loadData = async () => {
            const h = await dbGetAll('historia');
            const l = await dbGetAll('libros');
            const n = await dbGetAll('notas');
            const r = await dbGetAll('referencias');
            const t = await dbGetAll('tecnicas');
            const e = await dbGetAll('expos');
            setCounts({ historia: h.length, libros: l.length, notas: n.length, referencias: r.length, tecnicas: t.length, expos: e.length });
            if (h.length > 0) setLastHist(h[0]);
        };

        const getDailyContent = async () => {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('atelier_daily_v2');
            
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.date === today) {
                    setInspiration(parsed.data);
                    setLoadingInspiration(false);
                    return;
                }
            }

            // Seleccionar frase e imagen de respaldo inmediatamente por si falla la API
            const fallbackArt = FALLBACK_ART[Math.floor(Math.random() * FALLBACK_ART.length)];
            const fallbackQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];

            try {
                // API Museo Chicago
                const artRes = await fetch(`https://api.artic.edu/api/v1/artworks?page=${Math.floor(Math.random()*50)+1}&limit=1&fields=title,artist_display,image_id`);
                const artJson = await artRes.json();
                const art = artJson.data[0];

                const finalData = {
                    image: art.image_id ? `https://www.artic.edu/iiif/2/${art.image_id}/full/843,/0/default.jpg` : fallbackArt.img,
                    title: art.title || fallbackArt.title,
                    artist: art.artist_display || fallbackArt.artist,
                    quote: fallbackQuote.q,
                    quoteAuthor: fallbackQuote.a
                };

                setInspiration(finalData);
                localStorage.setItem('atelier_daily_v2', JSON.stringify({ date: today, data: finalData }));
            } catch (err) {
                const finalData = { image: fallbackArt.img, title: fallbackArt.title, artist: fallbackArt.artist, quote: fallbackQuote.q, quoteAuthor: fallbackQuote.a };
                setInspiration(finalData);
            } finally {
                setLoadingInspiration(false);
            }
        };

        return (
            <div className="w-full h-screen-safe flex flex-col bg-[#f5f6f8] overflow-hidden relative">
                <header className="px-6 pb-4 safe-pt flex justify-between items-end z-40">
                    <h1 className="text-[#4a5568] text-2xl font-light tracking-wide">Atelier <span className="text-sm opacity-40">アトリエ</span></h1>
                    <span className="text-[10px] uppercase font-bold text-[#5b85b5] tracking-widest">Estudio</span>
                </header>

                <div className="flex-1 overflow-y-auto hide-scrollbar main-content-pb px-6 pt-2">
                    {activeTab === 'inicio' && (
                        <div className="space-y-8">
                            <div>
                                <h2 className="font-serif text-3xl italic text-[#4a5568] mb-1">Buenos días.</h2>
                                <p className="text-xs text-gray-400 capitalize">{new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
                            </div>

                            <InspirationCard data={inspiration} loading={loadingInspiration} />

                            <div>
                                <h3 className="text-[10px] text-gray-400 mb-3 ml-2 font-bold uppercase tracking-widest">Reflexión Reciente</h3>
                                <div className="p-6 rounded-3xl nm-flat border-l-4 border-[#5b85b5] active:nm-inset transition-all">
                                    {lastHist ? (
                                        <>
                                            <p className="font-serif italic text-lg text-[#4a5568] line-clamp-3 leading-relaxed">"{lastHist.resumen}"</p>
                                            <div className="flex justify-between items-center mt-4">
                                                <span className="text-[10px] text-[#5b85b5] font-bold uppercase truncate max-w-[60%]">{lastHist.tema}</span>
                                                <span className="text-[10px] text-gray-400 uppercase">{lastHist.fecha}</span>
                                            </div>
                                        </>
                                    ) : <p className="text-gray-400 text-sm italic py-2">Escribe tu primer apunte para verlo aquí.</p>}
                                </div>
                            </div>

                            <div>
                                <h3 className="text-[10px] text-gray-400 mb-3 ml-2 font-bold uppercase tracking-widest">Tu Estudio</h3>
                                <div className="grid grid-cols-3 gap-4 pb-4">
                                    {[
                                        { l: 'HISTORIA', c: counts.historia, t: 'historia' },
                                        { l: 'LIBROS', c: counts.libros, t: 'libros' },
                                        { l: 'NOTAS', c: counts.notas, t: 'notas' },
                                        { l: 'REFS', c: counts.referencias, t: 'galeria' },
                                        { l: 'TECNICA', c: counts.tecnicas, t: 'tecnicas' },
                                        { l: 'EXPOS', c: counts.expos, t: 'expos' }
                                    ].map((item, i) => (
                                        <button key={i} onClick={() => setActiveTab(item.t)} className="aspect-square rounded-2xl flex flex-col items-center justify-center gap-1 nm-flat active:nm-inset transition-all">
                                            <span className={`text-xl font-serif ${item.c > 0 ? 'text-[#5b85b5]' : 'text-gray-400'}`}>{item.c}</span>
                                            <span className="text-[8px] font-bold text-gray-500 tracking-tighter">{item.l}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    {activeTab !== 'inicio' && (
                        <div className="flex flex-col items-center justify-center h-64 text-gray-400 fade-in">
                            <HistIco size={48} className="opacity-20 mb-4" />
                            <p className="font-serif italic text-lg">Sección {activeTab}</p>
                            <button onClick={() => setActiveTab('inicio')} className="mt-6 text-[10px] font-bold text-[#5b85b5] uppercase tracking-widest px-6 py-3 nm-flat rounded-full">Volver al inicio</button>
                        </div>
                    )}
                </div>

                <nav className="absolute bottom-0 w-full px-1 pt-3 safe-pb-nav nm-flat flex justify-between rounded-t-3xl z-50">
                    {[
                        { id: 'inicio', ico: HomeIco, l: 'INICIO' },
                        { id: 'historia', ico: HistIco, l: 'HISTORIA' },
                        { id: 'libros', ico: BookIco, l: 'LIBROS' },
                        { id: 'notas', ico: NoteIco, l: 'NOTAS' },
                        { id: 'galeria', ico: GalleryIco, l: 'GALERÍA' },
                        { id: 'expos', ico: ExpoIco, l: 'EXPOS' }
                    ].map((tab) => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-1 gap-1 transition-all active:scale-90 ${activeTab === tab.id ? 'text-[#5b85b5]' : 'text-gray-400'}`}>
                            <tab.ico size={22} className="flex-shrink-0" />
                            <span className="text-[8px] font-bold tracking-tighter">{tab.l}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
