<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ═══════════════════════════════════════════════
    // INDEXEDDB
    // ═══════════════════════════════════════════════
    const STORES = ['notas', 'referencias', 'libros', 'historia', 'expos', 'tecnicas'];
    const initDB = () => new Promise((res) => {
        const req = indexedDB.open("AtelierDB", 1);
        req.onupgradeneeded = e => STORES.forEach(s => !e.target.result.objectStoreNames.contains(s) && e.target.result.createObjectStore(s, {keyPath: "id"}));
        req.onsuccess = () => res(req.result);
    });
    const dbGetAll = async (s) => {
        const db = await initDB();
        return new Promise(res => {
            const req = db.transaction(s, "readonly").objectStore(s).getAll();
            req.onsuccess = () => res(req.result.sort((a,b) => b.id - a.id));
        });
    };
    const dbSave = async (s, d) => { const db = await initDB(); db.transaction(s, "readwrite").objectStore(s).put(d); };
    const dbDelete = async (s, id) => { const db = await initDB(); db.transaction(s, "readwrite").objectStore(s).delete(id); };

    // ═══════════════════════════════════════════════
    // ICONOS
    // ═══════════════════════════════════════════════
    const Icon = ({ path, size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );
    const HomeIco = (p) => <Icon {...p} path='<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' />;
    const BookIco = (p) => <Icon {...p} path='<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' />;
    const NoteIco = (p) => <Icon {...p} path='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line>' />;
    const GalleryIco = (p) => <Icon {...p} path='<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>' />;
    const ExpoIco = (p) => <Icon {...p} path='<rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline>' />;
    const HistIco = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>' />;
    const PlusIco = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
    const TrashIco = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>' />;
    const EditIco = (p) => <Icon {...p} path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>' />;
    const BackIco = (p) => <Icon {...p} path='<line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>' />;
    const SearchIco = (p) => <Icon {...p} path='<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>' />;
    const StarIco = (p) => <Icon {...p} path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>' />;
    const XIco = (p) => <Icon {...p} path='<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' />;

    // ═══════════════════════════════════════════════
    // DATOS DE RESPALDO
    // ═══════════════════════════════════════════════
    const FALLBACK_ART = [
        { img: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800", title: "Composición Floral", artist: "Abstracción Moderna" },
        { img: "https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800", title: "Impresión de Amanecer", artist: "Claude Monet (Ref)" },
        { img: "https://images.unsplash.com/photo-1549490349-8643362247b5?w=800", title: "Estudio de Color", artist: "Galería Atelier" }
    ];
    const QUOTES = [
        { q: "La pintura es poesía muda; la poesía pintura ciega.", a: "Leonardo da Vinci" },
        { q: "Aprende las reglas como un profesional para poder romperlas como un artista.", a: "Pablo Picasso" },
        { q: "No pinto lo que veo, sino lo que siento.", a: "Vincent van Gogh" },
        { q: "El arte lava del alma el polvo de la vida cotidiana.", a: "Pablo Picasso" },
        { q: "La inspiración existe, pero tiene que encontrarte trabajando.", a: "Pablo Picasso" }
    ];
    const todayStr = () => new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

    // ═══════════════════════════════════════════════
    // MODAL CONFIRMAR
    // ═══════════════════════════════════════════════
    const ConfirmModal = ({ msg, onOk, onCancel }) => (
        <div className="modal-overlay" onClick={onCancel}>
            <div className="modal-body slide-up" onClick={e => e.stopPropagation()} style={{borderRadius: '28px', maxWidth: '360px', margin: '0 auto 0'}}>
                <p className="text-center text-[#4a5568] text-sm mb-6 mt-2">{msg}</p>
                <div className="flex gap-3">
                    <button onClick={onCancel} className="flex-1 py-3 rounded-2xl nm-btn text-sm font-bold text-gray-500">Cancelar</button>
                    <button onClick={onOk} className="flex-1 py-3 rounded-2xl bg-red-400 text-white text-sm font-bold" style={{boxShadow:'4px 4px 10px #d8dde6, -4px -4px 10px #ffffff'}}>Eliminar</button>
                </div>
            </div>
        </div>
    );

    // ═══════════════════════════════════════════════
    // FORM MODAL GENÉRICO
    // ═══════════════════════════════════════════════
    const FormModal = ({ title, fields, data, onSave, onClose }) => {
        const [form, setForm] = useState(data || {});
        const set = (k, v) => setForm(p => ({...p, [k]: v}));
        const handleSave = () => {
            const required = fields.filter(f => f.required);
            for (const f of required) {
                if (!form[f.key] || !form[f.key].trim()) return;
            }
            onSave(form);
        };
        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-body slide-up hide-scrollbar" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-display text-2xl italic text-[#4a5568]">{title}</h2>
                        <button onClick={onClose} className="p-2 nm-btn rounded-full"><XIco size={18} /></button>
                    </div>
                    <div className="space-y-4">
                        {fields.map(f => (
                            <div key={f.key}>
                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">{f.label}</label>
                                {f.type === 'textarea' ? (
                                    <textarea className="nm-input" rows={f.rows || 4} placeholder={f.placeholder || ''} value={form[f.key] || ''} onChange={e => set(f.key, e.target.value)} />
                                ) : f.type === 'select' ? (
                                    <select className="nm-input" value={form[f.key] || f.options[0]} onChange={e => set(f.key, e.target.value)}>
                                        {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                ) : f.type === 'rating' ? (
                                    <div className="flex gap-2 ml-2 mt-1">
                                        {[1,2,3,4,5].map(n => (
                                            <button key={n} onClick={() => set(f.key, n)} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${(form[f.key] || 0) >= n ? 'text-amber-400' : 'text-gray-300'} nm-btn`}>
                                                <StarIco size={18} className={(form[f.key] || 0) >= n ? 'fill-amber-400' : ''} />
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <input type={f.type || 'text'} className="nm-input" placeholder={f.placeholder || ''} value={form[f.key] || ''} onChange={e => set(f.key, e.target.value)} />
                                )}
                            </div>
                        ))}
                    </div>
                    <button onClick={handleSave} className="w-full mt-6 py-4 rounded-2xl bg-[#5b85b5] text-white font-bold text-sm tracking-wider uppercase" style={{boxShadow:'4px 4px 10px #d8dde6, -4px -4px 10px #ffffff'}}>
                        Guardar
                    </button>
                </div>
            </div>
        );
    };

    // ═══════════════════════════════════════════════
    // SECTION HEADER (reutilizable)
    // ═══════════════════════════════════════════════
    const SectionHeader = ({ title, subtitle, onBack, onAdd, count }) => (
        <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-3">
                <button onClick={onBack} className="p-2 nm-btn rounded-full"><BackIco size={18} /></button>
                <div>
                    <h2 className="font-display text-xl italic text-[#4a5568]">{title}</h2>
                    <p className="text-[10px] text-gray-400 uppercase tracking-widest">{count} {subtitle}</p>
                </div>
            </div>
            <button onClick={onAdd} className="p-3 nm-btn rounded-full text-[#5b85b5]"><PlusIco size={20} /></button>
        </div>
    );

    // ═══════════════════════════════════════════════
    // SEARCH BAR
    // ═══════════════════════════════════════════════
    const SearchBar = ({ value, onChange, placeholder }) => (
        <div className="relative mb-4">
            <SearchIco size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
            <input className="nm-input pl-11" placeholder={placeholder || 'Buscar...'} value={value} onChange={e => onChange(e.target.value)} />
        </div>
    );

    // ═══════════════════════════════════════════════
    // EMPTY STATE
    // ═══════════════════════════════════════════════
    const EmptyState = ({ icon: Ico, text }) => (
        <div className="flex flex-col items-center justify-center py-20 text-gray-400 fade-in">
            <Ico size={48} className="opacity-20 mb-4" />
            <p className="font-display italic text-lg">{text}</p>
        </div>
    );

    // ═══════════════════════════════════════════════
    // SECCIÓN: HISTORIA
    // ═══════════════════════════════════════════════
    const PERIODOS = ['Prehistoria', 'Antigüedad', 'Medieval', 'Renacimiento', 'Barroco', 'Neoclásico', 'Romanticismo', 'Impresionismo', 'Moderno', 'Contemporáneo', 'Otro'];
    const periodoTag = (p) => {
        const map = { 'Prehistoria':'tag-slate','Antigüedad':'tag-amber','Medieval':'tag-rose','Renacimiento':'tag-green','Barroco':'tag-violet','Impresionismo':'tag-blue','Moderno':'tag-amber','Contemporáneo':'tag-blue' };
        return map[p] || 'tag-slate';
    };

    const HistoriaSection = ({ onBack, onDataChange }) => {
        const [items, setItems] = useState([]);
        const [search, setSearch] = useState('');
        const [showForm, setShowForm] = useState(false);
        const [editing, setEditing] = useState(null);
        const [confirm, setConfirm] = useState(null);

        const load = async () => { const d = await dbGetAll('historia'); setItems(d); };
        useEffect(() => { load(); }, []);

        const filtered = items.filter(i => !search || [i.tema, i.resumen, i.periodo].join(' ').toLowerCase().includes(search.toLowerCase()));

        const save = async (form) => {
            const item = { ...form, id: editing ? editing.id : Date.now(), fecha: editing ? editing.fecha : todayStr() };
            await dbSave('historia', item);
            setShowForm(false); setEditing(null); load(); onDataChange();
        };
        const del = async (id) => { await dbDelete('historia', id); setConfirm(null); load(); onDataChange(); };

        const fields = [
            { key: 'tema', label: 'Tema', required: true, placeholder: 'Ej: El claroscuro de Caravaggio' },
            { key: 'periodo', label: 'Periodo', type: 'select', options: PERIODOS },
            { key: 'resumen', label: 'Apuntes', type: 'textarea', rows: 5, placeholder: 'Tu reflexión o apuntes sobre el tema...' }
        ];

        return (
            <div className="fade-in">
                <SectionHeader title="Historia" subtitle="apuntes" onBack={onBack} onAdd={() => { setEditing(null); setShowForm(true); }} count={items.length} />
                <SearchBar value={search} onChange={setSearch} placeholder="Buscar en historia..." />
                {filtered.length === 0 ? <EmptyState icon={HistIco} text="Sin apuntes de historia aún" /> : (
                    <div className="space-y-3">
                        {filtered.map(item => (
                            <div key={item.id} className="p-5 rounded-2xl nm-flat fade-in">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="font-display text-lg italic text-[#4a5568] flex-1 mr-2">{item.tema}</h3>
                                    <div className="flex gap-1 flex-shrink-0">
                                        <button onClick={() => { setEditing(item); setShowForm(true); }} className="p-2 nm-btn rounded-xl text-gray-400"><EditIco size={14} /></button>
                                        <button onClick={() => setConfirm(item.id)} className="p-2 nm-btn rounded-xl text-gray-400"><TrashIco size={14} /></button>
                                    </div>
                                </div>
                                {item.resumen && <p className="text-sm text-gray-500 line-clamp-3 mb-3 leading-relaxed">{item.resumen}</p>}
                                <div className="flex justify-between items-center">
                                    {item.periodo && <span className={`tag ${periodoTag(item.periodo)}`}>{item.periodo}</span>}
                                    <span className="text-[10px] text-gray-400">{item.fecha}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                {showForm && <FormModal title={editing ? 'Editar Apunte' : 'Nuevo Apunte'} fields={fields} data={editing || { periodo: PERIODOS[0] }} onSave={save} onClose={() => { setShowForm(false); setEditing(null); }} />}
                {confirm && <ConfirmModal msg="¿Eliminar este apunte de historia?" onOk={() => del(confirm)} onCancel={() => setConfirm(null)} />}
            </div>
        );
    };

    // ═══════════════════════════════════════════════
    // SECCIÓN: LIBROS
    // ═══════════════════════════════════════════════
    const ESTADOS_LIBRO = ['Pendiente', 'Leyendo', 'Leído', 'Abandonado'];
    const estadoTag = (e) => {
        const map = { 'Pendiente':'tag-slate','Leyendo':'tag-blue','Leído':'tag-green','Abandonado':'tag-rose' };
        return map[e] || 'tag-slate';
    };

    const LibrosSection = ({ onBack, onDataChange }) => {
        const [items, setItems] = useState([]);
        const [search, setSearch] = useState('');
        const [showForm, setShowForm] = useState(false);
        const [editing, setEditing] = useState(null);
        const [confirm, setConfirm] = useState(null);

        const load = async () => { const d = await dbGetAll('libros'); setItems(d); };
        useEffect(() => { load(); }, []);

        const filtered = items.filter(i => !search || [i.titulo, i.autor, i.estado].join(' ').toLowerCase().includes(search.toLowerCase()));

        const save = async (form) => {
            const item = { ...form, id: editing ? editing.id : Date.now(), fecha: editing ? editing.fecha : todayStr() };
            await dbSave('libros', item);
            setShowForm(false); setEditing(null); load(); onDataChange();
        };
        const del = async (id) => { await dbDelete('libros', id); setConfirm(null); load(); onDataChange(); };

        const fields = [
            { key: 'titulo', label: 'Título', required: true, placeholder: 'Ej: Goodbye Things' },
            { key: 'autor', label: 'Autor', placeholder: 'Ej: Fumio Sasaki' },
            { key: 'estado', label: 'Estado', type: 'select', options: ESTADOS_LIBRO },
            { key: 'valoracion', label: 'Valoración', type: 'rating' },
            { key: 'notas', label: 'Notas', type: 'textarea', rows: 4, placeholder: 'Tus impresiones del libro...' }
        ];

        return (
            <div className="fade-in">
                <SectionHeader title="Libros" subtitle="en tu biblioteca" onBack={onBack} onAdd={() => { setEditing(null); setShowForm(true); }} count={items.length} />
                <SearchBar value={search} onChange={setSearch} placeholder="Buscar libros..." />
                {filtered.length === 0 ? <EmptyState icon={BookIco} text="Tu biblioteca está vacía" /> : (
                    <div className="space-y-3">
                        {filtered.map(item => (
                            <div key={item.id} className="p-5 rounded-2xl nm-flat fade-in">
                                <div className="flex justify-between items-start mb-1">
                                    <h3 className="font-display text-lg italic text-[#4a5568] flex-1 mr-2">{item.titulo}</h3>
                                    <div className="flex gap-1 flex-shrink-0">
                                        <button onClick={() => { setEditing(item); setShowForm(true); }} className="p-2 nm-btn rounded-xl text-gray-400"><EditIco size={14} /></button>
                                        <button onClick={() => setConfirm(item.id)} className="p-2 nm-btn rounded-xl text-gray-400"><TrashIco size={14} /></button>
                                    </div>
                                </div>
                                {item.autor && <p className="text-xs text-[#5b85b5] font-bold uppercase tracking-wider mb-2">{item.autor}</p>}

    // ═══════════════════════════════════════════════
    // APP PRINCIPAL
    // ═══════════════════════════════════════════════
    const App = () => {
        const [activeTab, setActiveTab] = useState('inicio');
        const [inspiration, setInspiration] = useState(null);
        const [loadingInspiration, setLoadingInspiration] = useState(true);
        const [counts, setCounts] = useState({ historia: 0, libros: 0, notas: 0, referencias: 0, tecnicas: 0, expos: 0 });
        const [lastHist, setLastHist] = useState(null);
        const scrollRef = useRef(null);

        const loadData = async () => {
            const h = await dbGetAll('historia');
            const l = await dbGetAll('libros');
            const n = await dbGetAll('notas');
            const r = await dbGetAll('referencias');
            const t = await dbGetAll('tecnicas');
            const e = await dbGetAll('expos');
            setCounts({ historia: h.length, libros: l.length, notas: n.length, referencias: r.length, tecnicas: t.length, expos: e.length });
            if (h.length > 0) setLastHist(h[0]);
            else setLastHist(null);
        };

        useEffect(() => { loadData(); getDailyContent(); }, []);
        useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [activeTab]);

        const getDailyContent = async () => {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('atelier_daily_v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.date === today) { setInspiration(parsed.data); setLoadingInspiration(false); return; }
            }
            const fallbackArt = FALLBACK_ART[Math.floor(Math.random() * FALLBACK_ART.length)];
            const fallbackQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            try {
                const artRes = await fetch(`https://api.artic.edu/api/v1/artworks?page=${Math.floor(Math.random()*50)+1}&limit=1&fields=title,artist_display,image_id`);
                const artJson = await artRes.json();
                const art = artJson.data[0];
                const finalData = {
                    image: art.image_id ? `https://www.artic.edu/iiif/2/${art.image_id}/full/843,/0/default.jpg` : fallbackArt.img,
                    title: art.title || fallbackArt.title, artist: art.artist_display || fallbackArt.artist,
                    quote: fallbackQuote.q, quoteAuthor: fallbackQuote.a
                };
                setInspiration(finalData);
                localStorage.setItem('atelier_daily_v2', JSON.stringify({ date: today, data: finalData }));
            } catch {
                const finalData = { image: fallbackArt.img, title: fallbackArt.title, artist: fallbackArt.artist, quote: fallbackQuote.q, quoteAuthor: fallbackQuote.a };
                setInspiration(finalData);
            } finally { setLoadingInspiration(false); }
        };

        const goBack = () => setActiveTab('inicio');

        // Greeting dinámico
        const hour = new Date().getHours();
        const greeting = hour < 13 ? 'Buenos días.' : hour < 20 ? 'Buenas tardes.' : 'Buenas noches.';

        return (
            <div className="w-full h-screen-safe flex flex-col bg-[#f5f6f8] overflow-hidden relative">
                <header className="px-6 pb-4 safe-pt flex justify-between items-end z-40">
                    <h1 className="text-[#4a5568] text-2xl font-light tracking-wide">Atelier <span className="text-sm opacity-40">アトリエ</span></h1>
                    <span className="text-[10px] uppercase font-bold text-[#5b85b5] tracking-widest">Estudio</span>
                </header>

                <div ref={scrollRef} className="flex-1 overflow-y-auto hide-scrollbar main-content-pb px-6 pt-2">

                    {activeTab === 'inicio' && (
                        <div className="space-y-8 fade-in">
                            <div>
                                <h2 className="font-display text-3xl italic text-[#4a5568] mb-1">{greeting}</h2>
                                <p className="text-xs text-gray-400 capitalize">{new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
                            </div>

                            <InspirationCard data={inspiration} loading={loadingInspiration} />

                            <div>
                                <h3 className="text-[10px] text-gray-400 mb-3 ml-2 font-bold uppercase tracking-widest">Reflexión Reciente</h3>
                                <div className="p-6 rounded-3xl nm-flat border-l-4 border-[#5b85b5]" onClick={() => lastHist && setActiveTab('historia')}>
                                    {lastHist ? (
                                        <>
                                            <p className="font-display italic text-lg text-[#4a5568] line-clamp-3 leading-relaxed">"{lastHist.resumen}"</p>
                                            <div className="flex justify-between items-center mt-4">
                                                <span className="text-[10px] text-[#5b85b5] font-bold uppercase truncate max-w-[60%]">{lastHist.tema}</span>
                                                <span className="text-[10px] text-gray-400 uppercase">{lastHist.fecha}</span>
                                            </div>
                                        </>
                                    ) : <p className="text-gray-400 text-sm italic py-2">Escribe tu primer apunte para verlo aquí.</p>}
                                </div>
                            </div>

                            <div>
                                <h3 className="text-[10px] text-gray-400 mb-3 ml-2 font-bold uppercase tracking-widest">Tu Estudio</h3>
                                <div className="grid grid-cols-3 gap-4 pb-4">
                                    {[
                                        { l: 'HISTORIA', c: counts.historia, t: 'historia', ico: '🏛' },
                                        { l: 'LIBROS', c: counts.libros, t: 'libros', ico: '📚' },
                                        { l: 'NOTAS', c: counts.notas, t: 'notas', ico: '✏️' },
                                        { l: 'GALERÍA', c: counts.referencias, t: 'galeria', ico: '🖼' },
                                        { l: 'TÉCNICA', c: counts.tecnicas, t: 'tecnicas', ico: '🎨' },
                                        { l: 'EXPOS', c: counts.expos, t: 'expos', ico: '🎭' }
                                    ].map((item, i) => (
                                        <button key={i} onClick={() => setActiveTab(item.t)} className="aspect-square rounded-2xl flex flex-col items-center justify-center gap-1 nm-flat active:nm-inset transition-all">
                                            <span className="text-lg mb-0.5">{item.ico}</span>
                                            <span className={`text-xl font-display ${item.c > 0 ? 'text-[#5b85b5]' : 'text-gray-400'}`}>{item.c}</span>
                                            <span className="text-[8px] font-bold text-gray-500 tracking-tighter">{item.l}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'historia' && <HistoriaSection onBack={goBack} onDataChange={loadData} />}
                    {activeTab === 'libros' && <LibrosSection onBack={goBack} onDataChange={loadData} />}
                    {activeTab === 'notas' && <NotasSection onBack={goBack} onDataChange={loadData} />}
                    {activeTab === 'galeria' && <GaleriaSection onBack={goBack} onDataChange={loadData} />}
                    {activeTab === 'expos' && <ExposSection onBack={goBack} onDataChange={loadData} />}
                    {activeTab === 'tecnicas' && <TecnicasSection onBack={goBack} onDataChange={loadData} />}
                </div>

                <nav className="absolute bottom-0 w-full px-1 pt-3 safe-pb-nav nm-flat flex justify-between rounded-t-3xl z-50">
                    {[
                        { id: 'inicio', ico: HomeIco, l: 'INICIO' },
                        { id: 'historia', ico: HistIco, l: 'HISTORIA' },
                        { id: 'libros', ico: BookIco, l: 'LIBROS' },
                        { id: 'notas', ico: NoteIco, l: 'NOTAS' },
                        { id: 'galeria', ico: GalleryIco, l: 'GALERÍA' },
                        { id: 'expos', ico: ExpoIco, l: 'EXPOS' }
                    ].map((tab) => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-1 gap-1 transition-all active:scale-90 ${activeTab === tab.id ? 'text-[#5b85b5]' : 'text-gray-400'}`}>
                            <tab.ico size={22} className="flex-shrink-0" />
                            <span className="text-[8px] font-bold tracking-tighter">{tab.l}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
