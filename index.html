<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport estricto para PWA en iOS: evita el zoom manual y ajusta a los bordes (cover) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    
    <!-- Meta tags para iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Atelier">
    <meta name="theme-color" content="#f5f6f8">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f5f6f8' width='100' height='100' rx='20'/><text y='65' x='50' text-anchor='middle' font-size='50'>🎨</text></svg>">
    <title>Atelier アトリエ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Ocultar la barra de scroll para un look más "app" */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f6f8;
            /* Evita el efecto "goma" al hacer scroll fuera de los límites */
            overscroll-behavior-y: none;
            overflow: hidden;
        }

        #root { width: 100%; height: 100%; }

        /* Uso estricto de 100dvh para iOS (Dynamic Viewport Height) */
        .h-screen-safe {
            height: 100vh; /* Fallback */
            height: 100dvh;
        }

        /* SAFE AREAS (Dynamic Island y Home Indicator) */
        .safe-pt { padding-top: max(env(safe-area-inset-top), 20px); }
        .safe-pb-nav { padding-bottom: max(env(safe-area-inset-bottom), 16px); }
        /* Margen inferior para las listas para que no queden tapadas por el menú inferior */
        .main-content-pb { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }

        /* BUG FIX: Zoom en inputs de iOS. DEBEN ser al menos 16px */
        input, textarea, select {
            font-size: 16px !important;
            line-height: normal !important;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border-radius: 0;
            /* Previene el auto-zoom */
            touch-action: manipulation; 
        }
        
        input[type="date"] {
            min-height: 48px;
        }

        /* Fix para line-clamp en Safari */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // --- BASE DE DATOS INDEXEDDB ---
    const DB_NAME = "AtelierDB";
    const DB_VERSION = 1;
    const STORES = ['notas', 'referencias', 'libros', 'historia', 'expos', 'tecnicas'];

    const initDB = () => {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                STORES.forEach(store => {
                    if (!db.objectStoreNames.contains(store)) {
                        db.createObjectStore(store, { keyPath: "id" });
                    }
                });
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    };

    const dbGetAll = async (storeName) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result.sort((a,b) => b.id - a.id));
            request.onerror = () => reject(request.error);
        });
    };

    const dbSave = async (storeName, data) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const request = store.put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    };

    const dbDelete = async (storeName, id) => {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    };

    // --- ICONOS INTEGRADOS ---
    const Icon = ({ path, size = 24, strokeWidth = 2, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const Home = (p) => <Icon {...p} path='<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' />;
    const Target = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>' />;
    const Book = (p) => <Icon {...p} path='<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' />;
    const FileText = (p) => <Icon {...p} path='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>' />;
    const ImageIcon = (p) => <Icon {...p} path='<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>' />;
    const ArrowLeft = (p) => <Icon {...p} path='<line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>' />;
    const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
    const Check = (p) => <Icon {...p} path='<polyline points="20 6 9 17 4 12"></polyline>' />;
    const Landmark = (p) => <Icon {...p} path='<line x1="3" y1="22" x2="21" y2="22"></line><line x1="6" y1="18" x2="6" y2="11"></line><line x1="10" y1="18" x2="10" y2="11"></line><line x1="14" y1="18" x2="14" y2="11"></line><line x1="18" y1="18" x2="18" y2="11"></line><polygon points="12 2 20 7 4 7"></polygon>' />;
    const Bookmark = (p) => <Icon {...p} path='<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>' />;
    const Tag = (p) => <Icon {...p} path='<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line>' />;
    const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;
    const Info = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>' />;
    const Edit2 = (p) => <Icon {...p} path='<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>' />;
    const MapPin = (p) => <Icon {...p} path='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>' />;
    const Calendar = (p) => <Icon {...p} path='<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>' />;
    const Ticket = (p) => <Icon {...p} path='<path d="M15 5.25a3 3 0 0 1-3-3H6a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3a3 3 0 0 1-3-3v-5.25z"></path><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="15" y2="17"></line>' />;
    const Palette = (p) => <Icon {...p} path='<circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path>' />;
    const Camera = (p) => <Icon {...p} path='<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>' />;
    const X = (p) => <Icon {...p} path='<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' />;
    const Loader = (p) => <Icon {...p} path='<line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line>' className="animate-spin" />;

    // --- TEMA Y ESTILOS CONSTANTES ---
    const theme = {
      bgMain: "bg-[#f5f6f8]",
      textDark: "text-[#4a5568]",
      bgAccent: "bg-[#5b85b5]",
      shadowFlat: "shadow-[6px_6px_16px_#d8dde6,-6px_-6px_16px_#ffffff]",
      shadowInset: "shadow-[inset_4px_4px_8px_#d8dde6,inset_-4px_-4px_8px_#ffffff]"
    };

    // --- FUNCIONES UTILERÍA ---
    const formatShortDate = (dateString) => {
      if (!dateString) return 'S/F';
      const date = new Date(dateString + 'T00:00:00');
      if (isNaN(date)) return dateString;
      return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    };

    const obtenerFechaActual = () => {
      return new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    };

    // FUNCIÓN ROBUSTA DE COMPRESIÓN DE IMÁGENES
    const compressImageFromUrl = async (url) => {
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        
        const objectUrl = URL.createObjectURL(blob);
        
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800;
              const MAX_HEIGHT = 800;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }
              
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
              URL.revokeObjectURL(objectUrl); 
              resolve(compressedBase64);
            } catch (err) {
              URL.revokeObjectURL(objectUrl);
              reject(err); 
            }
          };
          img.onerror = (err) => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("No se pudo cargar la imagen localmente."));
          };
          img.src = objectUrl;
        });
      } catch (error) {
        throw new Error("La política del servidor no permite descargar esta imagen para compresión.");
      }
    };

    // --- COMPONENTES DE UI ---

    const BottomNav = ({ activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'inicio', icon: Home, label: 'INICIO' },
        { id: 'historia', icon: Landmark, label: 'HISTORIA' },
        { id: 'libros', icon: Book, label: 'LIBROS' },
        { id: 'notas', icon: FileText, label: 'NOTAS' },
        { id: 'galeria', icon: ImageIcon, label: 'GALERÍA' },
        { id: 'expos', icon: Ticket, label: 'EXPOS' },
      ];

      return (
        <nav className={`absolute bottom-0 w-full px-1 pt-3 safe-pb-nav ${theme.bgMain} shadow-[0_-10px_20px_rgba(216,221,230,0.5)] flex justify-between rounded-t-3xl z-[50]`}>
          {tabs.map((tab) => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-1 gap-1 min-w-0 transition-all active:scale-95 ${activeTab === tab.id ? 'text-[#5b85b5]' : 'text-gray-400 hover:text-gray-500'}`}>
              <tab.icon size={22} strokeWidth={activeTab === tab.id ? 2.5 : 2} className="flex-shrink-0" />
              <span className="text-[9px] font-bold tracking-wider truncate px-1 w-full text-center">{tab.label}</span>
            </button>
          ))}
        </nav>
      );
    };

    const HomeView = ({ historia, libros, notas, referencias, expos, tecnicas, setActiveTab, abrirFormulario, handleGuardarRapido }) => {
      const [inspiracion, setInspiracion] = useState({ img: '', titulo: '', autor: '' });
      const [frase, setFrase] = useState({ texto: 'La inspiración existe, pero tiene que encontrarte trabajando.', firma: 'Pablo Picasso' });
      const [cargandoInspiracion, setCargandoInspiracion] = useState(true);
      
      const [savedImg, setSavedImg] = useState(false);
      const [isSavingImg, setIsSavingImg] = useState(false);
      const [savedQuote, setSavedQuote] = useState(false);

      const lastFetchTimeRef = useRef(0);

      const frases = [
        { texto: "La inspiración existe, pero tiene que encontrarte trabajando.", firma: "Pablo Picasso" },
        { texto: "Si oyes una voz dentro de ti que dice 'no puedes pintar', entonces pinta por todos los medios.", firma: "Vincent van Gogh" },
        { texto: "El arte lava del alma el polvo de la vida cotidiana.", firma: "Pablo Picasso" },
        { texto: "No pinto las cosas como las veo, sino como las siento.", firma: "Pablo Picasso" },
        { texto: "El arte es la mentira que nos permite comprender la verdad.", firma: "Pablo Picasso" },
        { texto: "La pintura es poesía muda; la poesía, pintura ciega.", firma: "Leonardo da Vinci" },
        { texto: "Aprende las reglas como un profesional para poder romperlas como un artista.", firma: "Pablo Picasso" },
        { texto: "No hay arte sin transformación.", firma: "Robert Bresson" },
        { texto: "El arte no reproduce lo visible, sino que hace visible lo que no siempre lo es.", firma: "Paul Klee" },
        { texto: "Pinto las flores para que no mueran.", firma: "Frida Kahlo" }
      ];

      const fetchInspiration = useCallback(() => {
        setCargandoInspiracion(true);
        setSavedImg(false);
        setSavedQuote(false);
        
        setFrase(frases[Math.floor(Math.random() * frases.length)]);

        // Usamos la API del Cleveland Museum of Art, mucho más estable para imágenes web
        const randomSkip = Math.floor(Math.random() * 3000); 
        fetch(`https://openaccess-api.clevelandart.org/api/artworks/?has_image=1&type=Painting&limit=10&skip=${randomSkip}`)
          .then(res => res.json())
          .then(response => {
            if (response && response.data) {
              const obra = response.data.find(item => item.images && item.images.web && item.images.web.url);
              if (obra) {
                setInspiracion({
                  img: obra.images.web.url,
                  titulo: obra.title || 'Obra sin título',
                  autor: obra.creators && obra.creators.length > 0 ? obra.creators[0].description : 'Artista desconocido'
                });
              } else {
                 setFallbackInspiracion();
              }
            } else {
               setFallbackInspiracion();
            }
          })
          .catch(err => {
              console.log("Error cargando inspiración:", err);
              setFallbackInspiracion();
          })
          .finally(() => setCargandoInspiracion(false));
      }, []);

      const setFallbackInspiracion = () => {
          setInspiracion({
              img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800&q=80',
              titulo: 'Exploración de Estudio',
              autor: 'Inspiración'
          });
      };

      const handleRefreshClick = () => {
        const now = Date.now();
        const CINCO_MINUTOS = 5 * 60 * 1000;
        if (now - lastFetchTimeRef.current >= CINCO_MINUTOS) {
            fetchInspiration();
            lastFetchTimeRef.current = now;
        }
      };

      useEffect(() => {
        fetchInspiration();
        lastFetchTimeRef.current = Date.now();
      }, [fetchInspiration]);

      const menuItems = [
        { label: 'HISTORIA', count: historia.length, tab: 'historia' },
        { label: 'LIBROS', count: libros.length, tab: 'libros' },
        { label: 'NOTAS', count: notas.length, tab: 'notas' },
        { label: 'REFS', count: referencias.length, tab: 'galeria' },
        { label: 'TÉCNICAS', count: tecnicas.length, tab: 'tecnicas' },
        { label: 'EXPOS', count: expos.length, tab: 'expos' },
      ];

      const onSaveImageClick = async (e) => {
          e.preventDefault();
          e.stopPropagation();
          if(savedImg || isSavingImg) return;
          
          setIsSavingImg(true);
          try {
              await handleGuardarRapido('galeria', inspiracion);
              setSavedImg(true);
              setTimeout(() => setSavedImg(false), 2000);
          } catch (err) {
              console.error("Error al guardar la imagen: ", err);
          } finally {
              setIsSavingImg(false);
          }
      };

      return (
        <main className="px-6 space-y-10 h-full overflow-y-auto hide-scrollbar main-content-pb pt-4">
          <div className="mt-2">
            <h2 className={`font-serif text-3xl italic ${theme.textDark} mb-1`}>Buenos días, artista.</h2>
            <p className="text-sm text-gray-500 capitalize">{obtenerFechaActual()}</p>
          </div>

          <div className="space-y-4">
            <div 
              onClick={handleRefreshClick}
              className={`p-2 rounded-[2rem] ${theme.bgMain} ${theme.shadowFlat} overflow-hidden cursor-pointer active:shadow-[inset_6px_6px_12px_#d8dde6,inset_-6px_-6px_12px_#ffffff] transition-all active:scale-[0.98] group`}
              title="Cambia cada 5 minutos"
            >
              <div className="aspect-video w-full rounded-[1.6rem] overflow-hidden bg-gray-200 relative">
                {!cargandoInspiracion && inspiracion.img && (
                  <button
                    onClick={onSaveImageClick}
                    className="absolute top-3 right-3 z-20 bg-black/30 backdrop-blur-md p-2 rounded-full text-white hover:bg-black/50 transition-all active:scale-90 flex items-center justify-center min-w-[32px] min-h-[32px]"
                    title="Guardar en Galería"
                  >
                    {isSavingImg ? <Loader size={16} /> : (savedImg ? <Check size={16} className="text-green-300" /> : <Bookmark size={16} />)}
                  </button>
                )}

                {inspiracion.img && !cargandoInspiracion ? (
                  <img 
                    src={inspiracion.img} 
                    alt="Inspiración" 
                    className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                    onError={(e) => {
                       e.target.onerror = null; 
                       setFallbackInspiracion();
                    }}
                  />
                ) : (
                  <div className="w-full h-full flex flex-col items-center justify-center bg-[#e2e8f0] animate-pulse">
                     <ImageIcon className="text-gray-400 mb-2" size={32} />
                  </div>
                )}
                {!cargandoInspiracion && inspiracion.titulo && (
                  <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 via-black/40 to-transparent pt-10 pointer-events-none">
                     <p className="text-xs text-white/90 uppercase tracking-widest font-bold truncate leading-tight mb-1">{inspiracion.titulo}</p>
                     <p className="text-[10px] text-white/70 truncate italic">{inspiracion.autor}</p>
                  </div>
                )}
              </div>
            </div>
            
            <div className="px-4 text-center relative flex flex-col items-center">
               <div onClick={handleRefreshClick} className="cursor-pointer active:opacity-50 transition-opacity w-full" title="Cambia cada 5 minutos">
                 <p className={`font-serif italic text-lg ${theme.textDark} leading-tight`}>"{frase.texto}"</p>
                 <p className="text-[10px] text-[#5b85b5] font-bold uppercase tracking-[0.2em] mt-2">— {frase.firma}</p>
               </div>
               
               <button
                 onClick={(e) => {
                   e.stopPropagation();
                   if(!savedQuote) {
                     handleGuardarRapido('historia', frase);
                     setSavedQuote(true);
                     setTimeout(() => setSavedQuote(false), 2000);
                   }

    const FormularioDinamico = ({ isAdding, onCancel, onSave }) => {
      const [formData, setFormData] = useState(() => {
        if (isAdding === 'expo') return { esGratis: false, dias: [] };
        return {};
      });

      const titulos = { nota: 'Nueva Obra', historia: 'Nuevo Apunte', libro: 'Añadir Libro', galeria: 'Nueva Referencia', expo: 'Añadir Exposición', tecnica: 'Nueva Receta / Técnica' };

      const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

      const toggleDia = (dia) => {
        setFormData(prev => {
            const diasActuales = prev.dias || [];
            if (diasActuales.includes(dia)) return { ...prev, dias: diasActuales.filter(d => d !== dia) };
            return { ...prev, dias: [...diasActuales, dia] };
        });
      };

      const handleLocalImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
              let width = img.width; let height = img.height;
              if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
              else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
              setFormData(prev => ({ ...prev, imagenesRef: [...(prev.imagenesRef || []), compressedBase64] }));
            }
          };
        });
      };

      const removeImageRef = (indexToRemove) => setFormData(prev => ({ ...prev, imagenesRef: prev.imagenesRef.filter((_, idx) => idx !== indexToRemove) }));

      return (
        <main className="h-full overflow-y-auto hide-scrollbar pb-36 bg-[#f5f6f8]">
          <div className="px-6 pb-4 safe-pt flex justify-between items-center sticky top-0 z-[40] bg-[#f5f6f8]/90 backdrop-blur-md" style={{WebkitBackdropFilter: 'blur(12px)'}}>

            <h2 className={`font-serif text-xl ${theme.textDark}`}>{titulos[isAdding]}</h2>
            <button onClick={() => onSave(formData)} className={`w-10 h-10 rounded-full ${theme.bgAccent} text-white shadow-[4px_4px_10px_#d8dde6,-4px_-4px_10px_#ffffff] flex items-center justify-center active:shadow-inner transition-all active:scale-95`}><Check size={20} /></button>
          </div>
          
          <div className="px-6 space-y-6 mt-4">
            {isAdding === 'nota' && (
              <div className="space-y-4">
                <input type="text" name="titulo" value={formData.titulo || ''} placeholder="Título de la obra..." onChange={handleInputChange} className={`w-full ${theme.bgMain} ${theme.shadowInset} rounded-2xl px-5 py-4 font-serif ${theme.textDark} text-base focus:outline-none`} />
                <input type="text" name="autor" value={formData.autor || ''} placeholder="Autor del cuadro..." onChange={handleInputChange} className={`w-full ${theme.bgMain} ${theme.shadowInset} rounded-2xl px-5 py-4 text-base ${theme.textDark} focus:outline-none`} />
                <div className="flex gap-4">
                  <input type="text" name="año" value={formData.año || ''} placeholder="Año (Ej. 1889)" onChange={handleInputChange} className={`flex-1 min-w-0 ${theme.bgMain} ${theme.shadowInset} rounded-2xl px-5 py-4 text-base ${theme.textDark} focus:outline-none`} />
                  <input type="text" name="disciplina" value={formData.disciplina || ''} placeholder="Disciplina..." onChange={handleInputChange} className={`flex-1 min-w-0 ${theme.bgMain} ${theme.shadowInset} rounded-2xl px-5 py-4 text-base ${theme.textDark} focus:outline-none`} />
                </div>
                <input type="text" name="imagen" value={formData.imagen || ''} placeholder="URL de la imagen de la obra..." onChange={handleInputChange} className={`w-full ${theme.bgMain} ${theme.shadowInset} rounded-2xl px-5 py-4 text-base text-[#5b85b5] focus:outline-none`} />
                <div className="pt-2">
                  <label className="text-[10px] text-gray-400 uppercase tracking-widest ml-2 mb-2 block font-bold">Visión Especializada</label>
                  <textarea name="historia" value={formData.historia || ''} placeholder="Análisis técnico, composición, color..." onChange={handleInputChange} className={`w-full ${theme.bgMain} ${theme.shadowInset} rounded-3xl px-6 py-5 min-h-[120px] text-base ${theme.textDark} leading-relaxed focus:outline-none`}></textarea>
                </div>
                <div>
                  <label className="text-[10px] text-gray-400 uppercase tracking-widest ml-2 mb-2 block font-bold">Inspiración personal</label>
                  <textarea name="inspiracion" value={formData.inspiracion || ''} placeholder="¿Qué ideas sacas para tus cuadros?" onChange={handleInputChange} className={`w-full ${theme.bgMain} ${theme.shadowInset} rounded-3xl px-6 py-5 min-h-[100px] text-base ${theme.textDark} italic font-serif leading-relaxed focus:outline-none`}></textarea>
                </div>

                        <button onClick={handleSaveResena} className={`px-4 py-2 rounded-xl ${theme.bgAccent} text-white text-xs font-bold uppercase tracking-widest shadow-md active:scale-95`}>Guardar</button>
                      </div>
                    </div>
                  ) : (
                    data.reseña ? <p className={`${theme.textDark} leading-relaxed text-sm whitespace-pre-line`}>{data.reseña}</p> : <p className="text-gray-400 text-sm italic font-serif">"Sin notas. Pulsa Editar para escribir."</p>
                  )}
                </div>
              </section>
            </div>
          )}

          {type === 'tecnica' && (
            <div className="px-8 mt-6 space-y-8">
              <div className="text-center border-b border-gray-200/50 pb-6">
                <span className="inline-flex items-center justify-center w-12 h-12 rounded-full text-[#5b85b5] mb-4 bg-[#f5f6f8] shadow-[inset_4px_4px_8px_#d8dde6,inset_-4px_-4px_8px_#ffffff]">
                  <Palette size={20} />
                </span>
                <h1 className={`font-serif text-3xl ${theme.textDark} mb-4 leading-tight`}>{data.titulo}</h1>
              </div>
              <div className="pt-2">
                <h3 className="text-xs text-gray-400 mb-4 font-bold uppercase tracking-widest text-center">Proceso / Receta</h3>
                <div className={`p-8 rounded-3xl ${theme.shadowInset} bg-[#f5f6f8] mb-8`}>
                  <p className={`${theme.textDark} leading-relaxed text-sm whitespace-pre-line`}>{data.pasos}</p>
                </div>
              </div>
            </div>
          )}
        </main>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('inicio');
      const [selectedItem, setSelectedItem] = useState(null); 
      const [isAdding, setIsAdding] = useState(null); 
      const [filtroGaleria, setFiltroGaleria] = useState('Todas');
      const [itemToDelete, setItemToDelete] = useState(null);

      const [notas, setNotas] = useState([]);
      const [referencias, setReferencias] = useState([]);
      const [libros, setLibros] = useState([]);
      const [historia, setHistoria] = useState([]);
      const [expos, setExpos] = useState([]);
      const [tecnicas, setTecnicas] = useState([]);

      useEffect(() => {
        const loadAllData = async () => {
          try {
            // Migración condicional: solo se ejecuta una vez
            const isMigrated = localStorage.getItem('atelier_migrated');
            if (!isMigrated) {
              const storesMap = {
                'atelier_notas': 'notas', 'atelier_referencias': 'referencias',
                'atelier_libros': 'libros', 'atelier_historia': 'historia',
                'atelier_expos': 'expos', 'atelier_tecnicas': 'tecnicas'
              };
              for (const [localKey, dbStore] of Object.entries(storesMap)) {
                const localData = localStorage.getItem(localKey);
                if (localData) {
                  try {
                    const parsedData = JSON.parse(localData);
                    if (Array.isArray(parsedData) && parsedData.length > 0) {
                      const currentDbData = await dbGetAll(dbStore);
                      if (currentDbData.length === 0) {
                        for (const item of parsedData) await dbSave(dbStore, item);
                      }
                    }
                  } catch (e) {}
                }
              }
              localStorage.setItem('atelier_migrated', 'true');
            }
            
            // Carga concurrente optimizada
            const [dbNotas, dbRefs, dbLibros, dbHistoria, dbExpos, dbTecnicas] = await Promise.all([
                dbGetAll('notas'), dbGetAll('referencias'), dbGetAll('libros'),
                dbGetAll('historia'), dbGetAll('expos'), dbGetAll('tecnicas')
            ]);
            
            setNotas(dbNotas); setReferencias(dbRefs); setLibros(dbLibros);
            setHistoria(dbHistoria); setExpos(dbExpos); setTecnicas(dbTecnicas);
          } catch (error) { console.error(error); }
        };
        loadAllData();
      }, []);

      const abrirFormulario = (tipo) => {
        setIsAdding(tipo);
      };

      const handleGuardarFormulario = async (formData) => {
        const id = Date.now();
        let nuevoItem = null; let storeName = "";
        
        if (isAdding === 'nota') {
          storeName = 'notas'; nuevoItem = { id, titulo: formData.titulo || 'Sin título', autor: formData.autor || 'Desconocido', año: formData.año || 'S/F', disciplina: formData.disciplina || 'Pintura', imagen: formData.imagen || 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800&q=80', etiquetas: [(formData.disciplina || 'Pintura').toLowerCase()], historia: formData.historia || 'Sin detalles.', inspiracion: formData.inspiracion || 'Sin notas.', evolucion: [] };
          setNotas([nuevoItem, ...notas]);
        } 
        else if (isAdding === 'historia') {
          storeName = 'historia'; const etiquetasArray = formData.etiquetas ? formData.etiquetas.split(',').map(e => e.trim()) : [];
          nuevoItem = { id, tema: formData.tema || 'Apunte sin título', fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }), etiquetas: etiquetasArray, resumen: formData.resumen || 'Sin contenido.' };
          setHistoria([nuevoItem, ...historia]);
        }
        else if (isAdding === 'libro') {
          storeName = 'libros'; nuevoItem = { id, titulo: formData.titulo || 'Libro sin título', autor: formData.autor || 'S/A', estado: formData.estado || 'Pendiente', progreso: 0, imagen: formData.imagen || 'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=400&q=80', reseña: formData.reseña || '' };
          setLibros([nuevoItem, ...libros]);
        }
        else if (isAdding === 'galeria') {
          storeName = 'referencias'; nuevoItem = { id, img: formData.imagen || 'https://images.unsplash.com/photo-1597255998145-66270ebfc6e1?w=500&q=80', cat: formData.categoria || 'Luz', nota: formData.nota || 'Sin nota' };
          setReferencias([nuevoItem, ...referencias]);
        }
        else if (isAdding === 'tecnica') {
          storeName = 'tecnicas'; nuevoItem = { id, titulo: formData.titulo || 'Receta sin título', medio: formData.medio || 'Óleo', pasos: formData.pasos || 'Sin pasos descritos.', imagenesRef: formData.imagenesRef || [] };
          setTecnicas([nuevoItem, ...tecnicas]);
        }
        else if (isAdding === 'expo') {
          storeName = 'expos'; nuevoItem = { id, titulo: formData.titulo || 'Exposición sin título', lugar: formData.lugar || 'Lugar desconocido', fechaInicio: formData.fechaInicio || '', fechaFin: formData.fechaFin || '', dias: formData.dias || [], esGratis: formData.esGratis === true, precio: formData.esGratis ? '0' : (formData.precio || ''), imagen: formData.imagen || 'https://images.unsplash.com/photo-1531058020387-3be344556be6?w=800&q=80', reseña: formData.reseña || '' };
          setExpos([nuevoItem, ...expos]);
        }
        if (nuevoItem && storeName) await dbSave(storeName, nuevoItem);
        setIsAdding(null);
      };

      const handleGuardarRapido = async (tipo, data) => {
        const id = Date.now();
        if (tipo === 'galeria') {
          // Guardamos directamente la URL externa sin intentar comprimirla.
          // Esto evita bloqueos del navegador por CORS o límites de memoria en Canvas.
          const nuevoItem = { id, img: data.img, cat: 'Inspiración', nota: `${data.titulo} - ${data.autor}` };
          try {
            await dbSave('referencias', nuevoItem);
            setReferencias(prev => [nuevoItem, ...prev]);
          } catch (err) {
            console.error("Error guardando referencia rápida:", err);
          }
        } else if (tipo === 'historia') {
          const nuevoItem = { 
             id, 
             tema: `Reflexión: ${data.firma}`, 
             fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }), 
             etiquetas: ['Inspiración', 'Cita'], 
             resumen: data.texto 
          };
          try {
            await dbSave('historia', nuevoItem);
            setHistoria(prev => [nuevoItem, ...prev]);
          } catch (err) {
            console.error("Error guardando historia rápida:", err);
          }
        }
      };

      const handleUpdateItemDetail = async (updatedItem) => {
        let storeName = "";
        if (selectedItem.type === 'nota') { storeName = 'notas'; setNotas(notas.map(n => n.id === updatedItem.id ? updatedItem : n)); }
        else if (selectedItem.type === 'expo') { storeName = 'expos'; setExpos(expos.map(e => e.id === updatedItem.id ? updatedItem : e)); }
        else if (selectedItem.type === 'libro') { storeName = 'libros'; setLibros(libros.map(l => l.id === updatedItem.id ? updatedItem : l)); }
        
        if (storeName) { 
           await dbSave(storeName, updatedItem); 
           setSelectedItem({ ...selectedItem, data: updatedItem }); 
        }
      };

      const handleEliminarClick = () => setItemToDelete({ type: selectedItem.type, id: selectedItem.data.id, isDetail: true });
      const handleEliminarReferenciaClick = (id) => setItemToDelete({ type: 'referencia', id: id, isDetail: false });

      const confirmarEliminar = async () => {
        const storeMap = { nota: 'notas', historia: 'historia', libro: 'libros', referencia: 'referencias', expo: 'expos', tecnica: 'tecnicas' };
        const storeName = storeMap[itemToDelete.type];
        if (storeName) await dbDelete(storeName, itemToDelete.id);

        if (itemToDelete.type === 'nota') setNotas(notas.filter(n => n.id !== itemToDelete.id));
        if (itemToDelete.type === 'historia') setHistoria(historia.filter(h => h.id !== itemToDelete.id));
        if (itemToDelete.type === 'libro') setLibros(libros.filter(l => l.id !== itemToDelete.id));
        if (itemToDelete.type === 'referencia') setReferencias(referencias.filter(r => r.id !== itemToDelete.id));
        if (itemToDelete.type === 'expo') setExpos(expos.filter(e => e.id !== itemToDelete.id));
        if (itemToDelete.type === 'tecnica') setTecnicas(tecnicas.filter(t => t.id !== itemToDelete.id));
        
        if (itemToDelete.isDetail) setSelectedItem(null);
        setItemToDelete(null);
      };

      const renderModal = () => {
        if (!itemToDelete) return null;
        return (
          <div className="absolute inset-0 z-[60] bg-black/40 backdrop-blur-sm flex items-center justify-center px-6 transition-all" style={{WebkitBackdropFilter: 'blur(4px)'}}>
            <div className={`w-full max-w-sm ${theme.bgMain} rounded-3xl p-6 ${theme.shadowFlat} flex flex-col items-center text-center`}>
              <div className="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mb-4 shadow-inner"><Trash2 size={28} className="text-red-400" /></div>
              <h3 className={`font-serif text-2xl ${theme.textDark} mb-2`}>¿Eliminar elemento?</h3>
              <p className="text-sm text-gray-500 mb-8 px-4">Esta acción no se puede deshacer.</p>
              <div className="flex gap-4 w-full">
                <button onClick={() => setItemToDelete(null)} className={`flex-1 py-4 rounded-2xl ${theme.bgMain} ${theme.shadowFlat} text-gray-500 font-bold text-xs uppercase tracking-widest active:scale-95 transition-all`}>Cancelar</button>
                <button onClick={confirmarEliminar} className="flex-1 py-4 rounded-2xl bg-red-400 text-white font-bold text-xs uppercase tracking-widest shadow-[4px_4px_10px_#d8dde6,-4px_-4px_10px_#ffffff] active:shadow-inner transition-all active:scale-95">Eliminar</button>
              </div>
            </div>
          </div>
        );
      };

      const renderCurrentView = () => {
        if (isAdding) return <FormularioDinamico isAdding={isAdding} onCancel={() => setIsAdding(null)} onSave={handleGuardarFormulario} />;
        if (selectedItem) return <VistaDetalle selectedItem={selectedItem} setSelectedItem={setSelectedItem} handleEliminarClick={handleEliminarClick} onUpdateItem={handleUpdateItemDetail} />;
        
        switch (activeTab) {
          case 'inicio': return <HomeView {...{historia, libros, notas, referencias, expos, tecnicas, setActiveTab, abrirFormulario, handleGuardarRapido}} />;
          case 'historia': return <HistoriaList {...{historia, abrirFormulario, setSelectedItem}} />;
          case 'libros': return <LibrosList {...{libros, abrirFormulario, setSelectedItem}} />;
          case 'notas': return <NotasList {...{notas, abrirFormulario, setSelectedItem}} />;
          case 'tecnicas': return <TecnicasList {...{tecnicas, abrirFormulario, setSelectedItem}} />;
          case 'galeria': return <GaleriaList {...{referencias, filtroGaleria, setFiltroGaleria, abrirFormulario, handleEliminarReferenciaClick}} />;
          case 'expos': return <ExposicionesList {...{expos, abrirFormulario, setSelectedItem}} />;
          default: return <HomeView {...{historia, libros, notas, referencias, expos, tecnicas, setActiveTab, abrirFormulario, handleGuardarRapido}} />;
        }
      };

      const showBottomNav = !isAdding && !selectedItem;

      return (
        <div className={`min-h-screen ${theme.bgMain} font-sans flex justify-center`}>
          <div className={`w-full relative ${theme.bgMain} overflow-hidden flex flex-col h-screen-safe`}>
            {renderModal()}
            {showBottomNav && (
              <header className="px-6 pb-4 safe-pt flex justify-between items-end flex-shrink-0 z-[40]">
                <div>
                  <h1 className={`${theme.textDark} text-2xl font-light tracking-wide flex items-baseline gap-2`}>
                    Atelier <span className="text-sm text-gray-400 font-sans">アトリエ</span>
                  </h1>
                </div>
                <div className="flex gap-4 text-gray-500">
                  <span className="text-xs uppercase tracking-widest mt-2">Estudio</span>
                </div>
              </header>
            )}
            <div className="flex-1 overflow-hidden relative">
              {renderCurrentView()}
            </div>
            {showBottomNav && <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
